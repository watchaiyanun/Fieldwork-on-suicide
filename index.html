        const App = () => {
            const [stage, setStage] = useState('setup');
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [responses, setResponses] = useState({});
            
            // แยกข้อมูลเคส กับ ผู้ให้ข้อมูล ออกจากกัน
            const [caseName, setCaseName] = useState('');
            const [informantName, setInformantName] = useState('');
            const [informantRelation, setInformantRelation] = useState('');
            const [interviewerName, setInterviewerName] = useState('');
            
            const [rawText, setRawText] = useState(''); 
            
            const [checks, setChecks] = useState({
                consent: false,
                confidentiality: false,
                rightToSkip: false
            });

            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitSuccess, setSubmitSuccess] = useState(false);

            const [searchQuery, setSearchQuery] = useState('');
            const [showSearchDropdown, setShowSearchDropdown] = useState(false);
            const [toast, setToast] = useState(null);

            const showToast = (title, message, type = 'success') => {
                setToast({ title, message, type });
                setTimeout(() => setToast(null), 5000); 
            };

            const handleAnalyzeText = () => {
                if (!rawText.trim()) {
                    showToast('ผิดพลาด', 'กรุณาวางข้อความที่ต้องการวิเคราะห์ในกล่องก่อนครับ', 'error');
                    return;
                }

                const paragraphs = rawText.split(/\n+/).map(p => p.trim()).filter(p => p.length > 0);
                let newResponses = { ...responses };
                let matchCount = 0;

                paragraphs.forEach(paragraph => {
                    let bestMatchId = null;
                    let maxScore = 0;

                    Object.keys(questionKeywords).forEach(qId => {
                        let score = 0;
                        questionKeywords[qId].forEach(keyword => {
                            if (paragraph.includes(keyword)) {
                                score += 1;
                            }
                        });

                        if (score > maxScore) {
                            maxScore = score;
                            bestMatchId = qId;
                        }
                    });

                    if (bestMatchId) {
                        const currentText = newResponses[bestMatchId]?.text || '';
                        newResponses[bestMatchId] = {
                            text: currentText ? currentText + '\n\n' + paragraph : paragraph,
                            status: 'answered'
                        };
                        matchCount++;
                    }
                });

                if (matchCount > 0) {
                    setResponses(newResponses);
                    showToast('✅ วิเคราะห์สำเร็จ', `ระบบพบคำสำคัญและกระจายข้อความลงในแบบสอบถาม ${matchCount} จุด`);
                    setRawText(''); 
                } else {
                    showToast('⚠️ ไม่พบคำสำคัญ', 'ระบบไม่พบคำสำคัญที่ตรงกับคำถาม สามารถคัดลอกข้อความไปวางเองในข้อที่ต้องการได้เลย', 'error');
                }
            };

            const handleStart = () => {
                // ต้องกรอกข้อมูลพื้นฐานให้ครบก่อนเริ่ม
                if (checks.consent && checks.confidentiality && checks.rightToSkip && caseName && informantName && informantRelation) {
                    setStage('interview');
                }
            };

            const handleTextChange = (e) => {
                const currentQ = allQuestions[currentQIndex].id;
                setResponses({
                    ...responses,
                    [currentQ]: { text: e.target.value, status: 'answered' }
                });
            };

            const handleNext = () => {
                if (currentQIndex < allQuestions.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                } else {
                    setStage('summary');
                }
            };

            const handlePrev = () => {
                if (currentQIndex > 0) {
                    setCurrentQIndex(currentQIndex - 1);
                }
            };

            const handleSkip = () => {
                const currentQ = allQuestions[currentQIndex].id;
                setResponses({
                    ...responses,
                    [currentQ]: { text: 'ผู้สัมภาษณ์เลือกข้ามคำถามนี้ (Skipped/Opt-out)', status: 'skipped' }
                });
                handleNext();
            };

            const jumpToQuestion = (index) => {
                setCurrentQIndex(index);
                setStage('interview');
                setShowSearchDropdown(false);
                setSearchQuery('');
            };

            const handleSubmitToSheet = async () => {
                if(SCRIPT_URL === '') {
                    showToast('Error', 'กรุณาตรวจสอบ URL ของ Google Apps Script', 'error');
                    return;
                }

                setIsSubmitting(true);
                
                // แก้ไข Payload ส่งข้อมูลแยก Case กับ Informant
                const payload = {
                    timestamp: new Date().toLocaleString('th-TH'),
                    interviewerName: interviewerName || 'ไม่ระบุ',
                    caseName: caseName,
                    informantName: informantName,
                    informantRelation: informantRelation,
                };
                
                allQuestions.forEach(q => {
                    const ans = responses[q.id];
                    payload[q.id] = ans ? ans.text : '';
                });

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        }
                    });
                    
                    const result = await response.json();
                    if(result.status === 'success') {
                        setSubmitSuccess(true);
                        showToast('บันทึกสำเร็จ', 'ข้อมูลถูกส่งเข้า Google Sheet เรียบร้อยแล้ว');
                    } else {
                        throw new Error(result.message || 'Unknown error');
                    }
                } catch (error) {
                    console.error('Error submitting data:', error);
                    showToast('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง', 'error');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const currentQuestion = allQuestions[currentQIndex];
            const currentResponse = responses[currentQuestion?.id]?.text || '';
            const progressPercent = Math.round(((currentQIndex) / allQuestions.length) * 100);

            const filteredQuestions = allQuestions.filter(q => 
                q.topic.toLowerCase().includes(searchQuery.toLowerCase()) || 
                q.text.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const renderToast = () => {
                if (!toast) return null;
                const isError = toast.type === 'error';
                return (
                    <div className="fixed top-6 right-6 z-[100] fade-in max-w-sm w-full bg-white rounded-xl shadow-2xl border-l-4 overflow-hidden" 
                         style={{ borderLeftColor: isError ? '#ef4444' : '#10b981' }}>
                        <div className="p-4 flex items-start gap-3">
                            {isError ? <AlertIcon /> : <CheckCircleIcon />}
                            <div>
                                <h4 className={`font-bold ${isError ? 'text-red-600' : 'text-green-600'}`}>{toast.title}</h4>
                                <p className="text-sm text-slate-600 mt-1 whitespace-pre-wrap">{toast.message}</p>
                            </div>
                            <button onClick={() => setToast(null)} className="ml-auto text-slate-400 hover:text-slate-600">✕</button>
                        </div>
                    </div>
                );
            };

            if (stage === 'setup') {
                const canStart = checks.consent && checks.confidentiality && checks.rightToSkip && caseName && informantName && informantRelation;
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 fade-in pb-12">
                        {renderToast()}
                        <div className="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                            <div className="bg-blue-900 p-8 text-white relative">
                                <div className="absolute top-0 right-0 p-8 opacity-10">
                                    <ShieldIcon />
                                </div>
                                <div className="flex items-center gap-3 mb-2 relative z-10">
                                    <ShieldIcon />
                                    <h1 className="text-2xl md:text-3xl font-bold">ระบบบันทึกการสัมภาษณ์เชิงบวก</h1>
                                </div>
                                <p className="text-blue-100 opacity-90 text-sm md:text-base relative z-10">Psychological Autopsy Interview Workspace</p>
                            </div>
                            
                            <div className="p-6 md:p-8">
                                {/* แบ่ง 2 คอลัมน์สำหรับข้อมูลพื้นฐาน */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 bg-slate-50 p-6 rounded-xl border border-slate-200">
                                    <div className="md:col-span-2 pb-2 border-b border-slate-200">
                                        <h3 className="font-bold text-slate-800 text-lg">ส่วนที่ 1: ข้อมูลผู้เสียชีวิต (Case)</h3>
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">1. รหัส/ชื่อ ผู้เสียชีวิต (Case ID / Deceased Name)<span className="text-red-500">*</span></label>
                                        <input type="text" 
                                            list="case-list"
                                            className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-slate-800"
                                            placeholder="พิมพ์ค้นหา หรือเลือกจากรายชื่อเคส..."
                                            value={caseName}
                                            onChange={(e) => setCaseName(e.target.value)}
                                            autoComplete="off"
                                        />
                                        <datalist id="case-list">
                                            {predefinedCases.map((person, idx) => (
                                                <option key={idx} value={person} />
                                            ))}
                                        </datalist>
                                    </div>
                                    
                                    <div className="md:col-span-2 pb-2 border-b border-slate-200 mt-2">
                                        <h3 className="font-bold text-slate-800 text-lg">ส่วนที่ 2: ข้อมูลผู้ให้ข้อมูล (Informant)</h3>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">2. ชื่อ-สกุล ผู้ให้ข้อมูล (Informant Name)<span className="text-red-500">*</span></label>
                                        <input type="text" 
                                            className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-slate-800"
                                            placeholder="ระบุชื่อผู้ถูกสัมภาษณ์ในครั้งนี้..."
                                            value={informantName}
                                            onChange={(e) => setInformantName(e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">3. ความสัมพันธ์กับผู้เสียชีวิต<span className="text-red-500">*</span></label>
                                        <select 
                                            className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-slate-800 bg-white"
                                            value={informantRelation}
                                            onChange={(e) => setInformantRelation(e.target.value)}
                                        >
                                            <option value="" disabled>-- เลือกความสัมพันธ์ --</option>
                                            {relationOptions.map((rel, idx) => (
                                                <option key={idx} value={rel}>{rel}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">4. ชื่อผู้สัมภาษณ์ (Interviewer)</label>
                                        <input type="text" 
                                            className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-slate-800"
                                            placeholder="ระบุชื่อผู้สัมภาษณ์ (เจ้าหน้าที่)..."
                                            value={interviewerName}
                                            onChange={(e) => setInterviewerName(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="bg-blue-50 rounded-xl p-5 md:p-6 border border-blue-100 mb-8">
                                    <h2 className="text-lg font-bold text-blue-900 mb-4 flex items-center gap-2">
                                        <InfoIcon /> ข้อปฏิบัติก่อนเริ่มการสัมภาษณ์ (Pre-flight Checklist)
                                    </h2>
                                    <div className="space-y-4">
                                        <label className="flex items-start gap-3 cursor-pointer group">
                                            <div className="mt-1">
                                                <input type="checkbox" className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500" 
                                                    checked={checks.consent} onChange={(e) => setChecks({...checks, consent: e.target.checked})} />
                                            </div>
                                            <span className="text-slate-700 text-sm md:text-base group-hover:text-slate-900 transition-colors">
                                                <strong>การยินยอม (Consent):</strong> ข้าพเจ้าได้แจ้งวัตถุประสงค์และผู้ให้ข้อมูลยินยอมให้สัมภาษณ์แล้ว
                                            </span>
                                        </label>
                                        <label className="flex items-start gap-3 cursor-pointer group">
                                            <div className="mt-1">
                                                <input type="checkbox" className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500" 
                                                    checked={checks.confidentiality} onChange={(e) => setChecks({...checks, confidentiality: e.target.checked})} />
                                            </div>
                                            <span className="text-slate-700 text-sm md:text-base group-hover:text-slate-900 transition-colors">
                                                <strong>การรักษาความลับ (Confidentiality):</strong> แจ้งว่าข้อมูลทั้งหมดจะถูกเก็บเป็นความลับเพื่อการศึกษานี้เท่านั้น
                                            </span>
                                        </label>
                                        <label className="flex items-start gap-3 cursor-pointer group">
                                            <div className="mt-1">
                                                <input type="checkbox" className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500" 
                                                    checked={checks.rightToSkip} onChange={(e) => setChecks({...checks, rightToSkip: e.target.checked})} />
                                            </div>
                                            <span className="text-slate-700 text-sm md:text-base group-hover:text-slate-900 transition-colors">
                                                <strong>สิทธิในการถอนตัว (Right to Skip):</strong> แจ้งว่า "หากคำถามไหนทำให้สะเทือนใจ สามารถข้ามหรือหยุดพักได้ทันที"
                                            </span>
                                        </label>
                                    </div>
                                </div>

                                <div className="bg-slate-50 rounded-xl p-5 md:p-6 border border-slate-200 mb-8">
                                    <h2 className="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                                        <svg className="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                        วิเคราะห์แยกข้ออัตโนมัติแบบ Offline (ตัวเลือกเสริม)
                                    </h2>
                                    <textarea 
                                        className="w-full h-24 p-3 text-sm text-slate-800 border border-slate-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all resize-none mb-3"
                                        placeholder="วางบันทึกคำบอกเล่าที่นี่ แนะนำให้เคาะเว้นบรรทัดเพื่อแยกประเด็น..."
                                        value={rawText}
                                        onChange={(e) => setRawText(e.target.value)}
                                    ></textarea>
                                    <button onClick={handleAnalyzeText} className="px-4 py-2 bg-purple-100 text-purple-700 font-bold rounded-lg hover:bg-purple-200 transition-colors flex items-center gap-2 text-sm">
                                        วิเคราะห์และจัดกลุ่มข้อมูล
                                    </button>
                                </div>

                                <div className="flex justify-end">
                                    <button 
                                        onClick={handleStart}
                                        disabled={!canStart}
                                        className={`px-8 py-4 rounded-xl font-bold text-lg transition-all shadow-md flex items-center justify-center gap-2 w-full md:w-auto
                                            ${canStart ? 'bg-blue-600 text-white hover:bg-blue-700 hover:shadow-lg transform hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                                    >
                                        เริ่มการสัมภาษณ์ <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (stage === 'summary') {
                return (
                    <div className="min-h-screen bg-slate-50 p-4 md:p-12 fade-in pb-32">
                        {renderToast()}
                        <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                            <div className="text-center mb-10 pb-6 border-b border-slate-100">
                                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-4">
                                    <CheckCircleIcon />
                                </div>
                                <h1 className="text-2xl md:text-3xl font-bold text-slate-800 mb-2">ตรวจสอบความถูกต้อง</h1>
                                <p className="text-slate-600 mt-2 text-lg">เคส: <strong>{caseName}</strong></p>
                                <p className="text-slate-500">สัมภาษณ์ผู้ให้ข้อมูล: <strong>{informantName}</strong> ({informantRelation})</p>
                            </div>

                            <div className="space-y-8">
                                {surveyData.map((category) => (
                                    <div key={category.categoryId} className="mb-6">
                                        <h3 className="text-lg font-bold text-blue-900 mb-4 bg-blue-50 p-3 rounded-lg border border-blue-100">
                                            หมวดที่ {category.categoryId}: {category.categoryName}
                                        </h3>
                                        <div className="space-y-5 pl-2 md:pl-4">
                                            {category.questions.map(q => {
                                                const qIndex = allQuestions.findIndex(x => x.id === q.id);
                                                const ans = responses[q.id];
                                                const isSkipped = ans?.status === 'skipped';
                                                const isAnswered = ans?.text?.trim().length > 0;
                                                
                                                return (
                                                    <div key={q.id} className="border-l-4 border-slate-200 pl-4 py-1 group relative">
                                                        <div className="flex justify-between items-start mb-1">
                                                            <p className={`text-sm font-semibold pr-16 ${!isAnswered ? 'text-red-500' : 'text-slate-600'}`}>
                                                                {q.topic}
                                                            </p>
                                                            <button onClick={() => jumpToQuestion(qIndex)} className="opacity-0 group-hover:opacity-100 absolute right-0 top-0 px-3 py-1 bg-slate-100 hover:bg-blue-100 text-blue-600 text-xs font-bold rounded-lg transition-all flex items-center gap-1">
                                                                <EditIcon /> แก้ไข
                                                            </button>
                                                        </div>
                                                        {isAnswered ? (
                                                            <p className={`text-base mt-1 ${isSkipped ? 'text-red-500 italic' : 'text-slate-800 whitespace-pre-wrap'}`}>{ans.text}</p>
                                                        ) : (
                                                            <p className="text-red-500 italic text-sm mt-1 bg-red-50 inline-block px-2 py-1 rounded">(ยังไม่ได้ตอบคำถามนี้)</p>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-50">
                                <div className="max-w-4xl mx-auto flex flex-col md:flex-row gap-3 justify-between items-center">
                                    <button onClick={() => window.location.reload()} className="px-6 py-3 w-full md:w-auto bg-slate-100 border border-slate-300 text-slate-700 rounded-xl font-semibold hover:bg-slate-200 transition-colors">
                                        สัมภาษณ์คนถัดไป (Reset)
                                    </button>
                                    
                                    <div className="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                                        <button onClick={() => window.print()} className="px-6 py-3 bg-slate-800 text-white rounded-xl font-semibold hover:bg-slate-900 transition-colors shadow-sm flex items-center justify-center gap-2">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                            พิมพ์ PDF
                                        </button>
                                        
                                        <button onClick={handleSubmitToSheet} disabled={isSubmitting || submitSuccess}
                                            className={`px-8 py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2 transition-all
                                                ${submitSuccess ? 'bg-green-600 text-white cursor-default' : 
                                                  isSubmitting ? 'bg-blue-400 text-white cursor-wait' : 'bg-blue-600 text-white hover:bg-blue-700 hover:-translate-y-0.5'}`}
                                        >
                                            {submitSuccess ? <><CheckCircleIcon /> ส่งข้อมูลสำเร็จ</> : isSubmitting ? <><div className="spinner"></div> กำลังบันทึก...</> : <><SaveIcon /> ส่งเข้า Google Sheet</>}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col md:flex-row bg-slate-50 fade-in overflow-hidden">
                    {renderToast()}
                    
                    {/* Sidebar */}
                    <div className="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col h-full z-10 shadow-[2px_0_10px_rgba(0,0,0,0.02)] hidden md:flex">
                        <div className="p-5 border-b border-slate-100 bg-slate-50/50">
                            <h2 className="font-bold text-slate-800 text-sm truncate" title={caseName}>เคส: {caseName.split('-')[0]}</h2>
                            <p className="text-xs text-slate-500 mb-3 truncate">ให้ข้อมูลโดย: {informantName}</p>
                            <div className="flex justify-between items-end mb-1">
                                <span className="text-xs font-semibold text-slate-500">ความคืบหน้า</span>
                                <span className="text-sm font-bold text-blue-600">{progressPercent}%</span>
                            </div>
                            <div className="w-full bg-slate-200 rounded-full h-2">
                                <div className="bg-blue-600 h-2 rounded-full transition-all duration-500" style={{ width: `${progressPercent}%` }}></div>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-4 space-y-6">
                            {surveyData.map((category) => {
                                const isActiveCategory = category.categoryId === currentQuestion.categoryId;
                                return (
                                    <div key={category.categoryId} className={`transition-opacity duration-300 ${isActiveCategory ? 'opacity-100' : 'opacity-50 hover:opacity-100'}`}>
                                        <h3 className={`text-[11px] font-bold uppercase tracking-wider mb-2 ${isActiveCategory ? 'text-blue-600' : 'text-slate-500'}`}>
                                            หมวด {category.categoryId}
                                        </h3>
                                        <ul className="space-y-1">
                                            {category.questions.map((q) => {
                                                const qIndex = allQuestions.findIndex(x => x.id === q.id);
                                                const isCurrent = q.id === currentQuestion.id;
                                                const ans = responses[q.id];
                                                const hasAnswer = ans?.text?.trim().length > 0;
                                                
                                                let textStyle = "text-slate-600";
                                                if (isCurrent) textStyle = "text-blue-700 font-semibold";
                                                else if (!hasAnswer && qIndex < currentQIndex) textStyle = "text-red-500"; 
                                                
                                                return (
                                                    <li key={q.id} onClick={() => jumpToQuestion(qIndex)}
                                                        className={`text-sm py-2 px-3 rounded-lg cursor-pointer transition-all flex items-center justify-between group
                                                            ${isCurrent ? 'bg-blue-50 border border-blue-100' : 'hover:bg-slate-50'}`}
                                                    >
                                                        <span className={`truncate pr-2 ${textStyle}`}>{q.topic}</span>
                                                        {hasAnswer && !isCurrent && <CheckCircleIcon />}
                                                    </li>
                                                );
                                            })}
                                        </ul>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Main Workspace */}
                    <div className="flex-1 flex flex-col h-full bg-[#f8fafc] relative">
                        <div className="h-16 bg-white border-b border-slate-200 flex items-center px-6 justify-between shrink-0 relative z-30">
                            <div className="md:hidden font-bold text-sm text-slate-800 truncate max-w-[50%]">{caseName}</div>
                            
                            <div className="relative w-full max-w-md ml-auto">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><SearchIcon /></div>
                                <input type="text" className="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-full text-sm focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white transition-all text-slate-800"
                                    placeholder="ค้นหาข้อคำถาม..."
                                    value={searchQuery}
                                    onChange={(e) => { setSearchQuery(e.target.value); setShowSearchDropdown(e.target.value.length > 0); }}
                                    onFocus={() => { if(searchQuery.length > 0) setShowSearchDropdown(true); }}
                                    onBlur={() => setTimeout(() => setShowSearchDropdown(false), 200)}
                                />
                                {showSearchDropdown && (
                                    <div className="absolute top-full mt-2 w-full bg-white rounded-xl shadow-xl border border-slate-200 max-h-80 overflow-y-auto z-50">
                                        {filteredQuestions.length > 0 ? (
                                            filteredQuestions.map(q => {
                                                const idx = allQuestions.findIndex(x => x.id === q.id);
                                                return (
                                                    <div key={q.id} className="p-3 hover:bg-blue-50 cursor-pointer border-b border-slate-50" onClick={() => jumpToQuestion(idx)}>
                                                        <div className="text-xs text-blue-600 font-bold mb-1">{q.topic}</div>
                                                        <div className="text-sm text-slate-600 line-clamp-2">{q.text}</div>
                                                    </div>
                                                );
                                            })
                                        ) : <div className="p-4 text-center text-sm text-slate-500">ไม่พบคำถามที่ค้นหา</div>}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 md:p-12 pb-32">
                            <div className="max-w-3xl mx-auto">
                                <div className="mb-6 md:mb-8 fade-in" key={currentQuestion.id}>
                                    <div className="inline-block px-3 py-1 bg-blue-100 text-blue-800 text-xs font-bold rounded-full mb-4">
                                        หมวด {currentQuestion.categoryId}: {currentQuestion.categoryName}
                                    </div>
                                    <h2 className="text-xl md:text-3xl font-bold text-slate-800 leading-relaxed mb-6">
                                        <span className="text-slate-400 mr-2 text-lg md:text-2xl">Q{currentQIndex + 1}.</span> 
                                        "{currentQuestion.text}"
                                    </h2>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col shadow-[0_4px_20px_rgba(0,0,0,0.03)]">
                                    <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
                                        <span className="text-sm font-semibold text-slate-600 flex items-center gap-2">
                                            บันทึกคำให้การ (Notes)
                                        </span>
                                    </div>
                                    <textarea 
                                        className="w-full h-56 md:h-64 p-4 md:p-6 focus:outline-none focus:ring-inset focus:ring-2 focus:ring-blue-100 resize-none text-slate-800 text-base md:text-lg leading-relaxed bg-white"
                                        placeholder="พิมพ์บันทึกคำตอบที่นี่... (ระบบจะบันทึกอัตโนมัติ)"
                                        value={currentResponse === 'ผู้สัมภาษณ์เลือกข้ามคำถามนี้ (Skipped/Opt-out)' ? '' : currentResponse}
                                        onChange={handleTextChange}
                                        disabled={responses[currentQuestion.id]?.status === 'skipped'}
                                    ></textarea>
                                </div>
                            </div>
                        </div>

                        <div className="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-3 md:p-4 px-4 md:px-12 flex justify-between items-center shadow-[0_-4px_10px_rgba(0,0,0,0.02)] z-20">
                            <button onClick={handlePrev} disabled={currentQIndex === 0}
                                className={`px-4 py-2 md:px-5 md:py-2.5 rounded-lg font-medium transition-colors flex items-center gap-1 md:gap-2 text-sm md:text-base
                                    ${currentQIndex === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-100'}`}
                            >ก่อนหน้า</button>

                            <div className="flex gap-2 md:gap-3">
                                <button onClick={handleSkip} className="px-3 py-2 md:px-5 md:py-2.5 rounded-lg font-medium text-slate-500 hover:bg-red-50 hover:text-red-600 transition-colors flex items-center border border-transparent hover:border-red-100 text-sm md:text-base" title="หากผู้ตอบรู้สึกอึดอัด สามารถข้ามคำถามนี้ได้ทันที">
                                    <SkipIcon /> <span className="hidden sm:inline">ข้ามคำถามนี้</span><span className="sm:hidden">ข้าม</span>
                                </button>
                                <button onClick={handleNext} className="px-5 py-2 md:px-8 md:py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-all shadow-sm flex items-center gap-1 md:gap-2 text-sm md:text-base">
                                    {currentQIndex === allQuestions.length - 1 ? 'ไปหน้าสรุปผล' : 'ข้อถัดไป'} 
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
